<!DOCTYPE html>
<html>
<head>
<title>Phishing Detector</title>
<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
</head>

<body class="bg-dark text-white">
<div class="container mt-5">

<h2 class="text-center mb-4">📧 Phishing Detector</h2>

<form method="POST" enctype="multipart/form-data">
<textarea name="email" class="form-control mb-3" rows="5" placeholder="Paste email"></textarea>
<input type="file" name="file" class="form-control mb-3">
<button class="btn btn-primary w-100">Check</button>
</form>

<a href="/dashboard" class="btn btn-warning mt-3">Dashboard</a>

{% if result %}
<div class="mt-4 p-3 bg-secondary rounded">
<h4>{{ result }}</h4>

<div class="progress">
<div class="progress-bar {% if score > 0.5 %}bg-danger{% else %}bg-success{% endif %}" style="width: {{score*100}}%">
{{ (score*100)|round(1) }}%
</div>
</div>

<ul class="mt-3">
{% for r in reasons %}
<li>{{ r }}</li>
{% endfor %}
</ul>

<h5 class="mt-3">🤖 AI Explanation:</h5>
<p>{{ explanation }}</p>

</div>
{% endif %}

</div>
</body>
</html>
