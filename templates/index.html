<!DOCTYPE html>
<html>
<head>
    <title>Phishing Detector</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
</head>

<body class="bg-dark text-white">

<div class="container mt-5">

    <h2 class="text-center mb-4">📧 Phishing Email Detector</h2>

    <form method="POST" enctype="multipart/form-data">

        <div class="mb-3">
            <label class="form-label">Paste Email</label>
            <textarea name="email" class="form-control" rows="6"></textarea>
        </div>

        <div class="mb-3">
            <label class="form-label">Or Upload .eml File</label>
            <input type="file" name="file" class="form-control">
        </div>

        <button type="submit" class="btn btn-primary w-100">Check Email</button>
    </form>

    {% if result %}
    <div class="mt-4 p-4 bg-secondary rounded">

        <h4>Result: {{ result }}</h4>

        <div class="progress mb-3">
            <div class="progress-bar {% if score > 0.5 %}bg-danger{% else %}bg-success{% endif %}" 
                 role="progressbar" 
                 style="width: {{ score * 100 }}%">
                {{ (score * 100)|round(2) }}%
            </div>
        </div>

        {% if score > 0.5 %}
            <p class="text-danger">⚠️ Phishing Detected</p>
        {% else %}
            <p class="text-success">✅ Safe Email</p>
        {% endif %}

        <h5>Reasons:</h5>
        <ul>
            {% for r in reasons %}
                <li>{{ r }}</li>
            {% endfor %}
        </ul>

    </div>
    {% endif %}

</div>

</body>
</html>
</body>
</html>
