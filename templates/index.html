<!DOCTYPE html>
<html>
<head>
<title>Phishing Detector</title>
<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">

<style>
body {
    background: linear-gradient(135deg, #0f2027, #203a43, #2c5364);
    color: white;
    font-family: Arial;
}

.glass {
    background: rgba(255, 255, 255, 0.1);
    border-radius: 20px;
    backdrop-filter: blur(10px);
    padding: 30px;
    box-shadow: 0 8px 32px rgba(0,0,0,0.3);
}

textarea, input {
    border-radius: 10px !important;
}

button {
    transition: 0.3s;
}

button:hover {
    transform: scale(1.05);
}

.progress {
    height: 25px;
    border-radius: 15px;
}

.badge-box {
    font-size: 18px;
    padding: 8px 15px;
}

.spinner {
    display: none;
}
</style>
</head>

<body>

<div class="container mt-5">

<div class="glass">

<h2 class="text-center mb-4">📧 Phishing Detector</h2>

<form method="POST" enctype="multipart/form-data" onsubmit="showLoader()">

<textarea name="email" class="form-control mb-3" rows="5" placeholder="Paste email here..."></textarea>

<input type="file" name="file" class="form-control mb-3">

<button class="btn btn-primary w-100">🚀 Analyze Email</button>

</form>

<!-- Loader -->
<div class="text-center mt-3 spinner" id="loader">
<div class="spinner-border text-light"></div>
<p>Scanning for threats...</p>
</div>

<a href="/dashboard" class="btn btn-warning mt-3 w-100">📊 Dashboard</a>

{% if result %}
<div class="mt-4">

<!-- Result badge -->
<div class="text-center mb-3">
<span class="badge 
{% if score > 0.5 %}bg-danger{% else %}bg-success{% endif %} 
badge-box">
{{ result }}
</span>
</div>

<!-- Progress -->
<div class="progress mb-3">
<div class="progress-bar 
{% if score > 0.5 %}bg-danger{% else %}bg-success{% endif %}" 
style="width: {{score*100}}%">
{{ (score*100)|round(1) }}%
</div>
</div>

<!-- Reasons -->
<div class="glass mb-3">
<h5>⚠️ Detection Reasons</h5>
<ul>
{% for r in reasons %}
<li>{{ r }}</li>
{% endfor %}
</ul>
</div>

<!-- AI Explanation -->
<div class="glass">
<h5>🤖 AI Explanation</h5>
<p>{{ explanation }}</p>
</div>

</div>
{% endif %}

</div>

</div>

<script>
function showLoader() {
    document.getElementById("loader").style.display = "block";
}
</script>

</body>
</html>
