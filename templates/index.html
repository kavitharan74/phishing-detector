<!DOCTYPE html>
<html>
<head>
<title>Phishing Detector</title>
<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">

<style>
body {
    background: linear-gradient(to right, #141e30, #243b55);
    color: white;
}

.card {
    border-radius: 15px;
}

.spinner {
    display: none;
}
</style>
</head>

<body>

<div class="container mt-5">

<div class="card p-4 shadow-lg bg-dark">

<h2 class="text-center mb-4">📧 Phishing Email Detector</h2>

<form method="POST" enctype="multipart/form-data" onsubmit="showLoader()">

<textarea name="email" class="form-control mb-3" rows="5" placeholder="Paste email content here..."></textarea>

<input type="file" name="file" class="form-control mb-3">

<button class="btn btn-primary w-100">🚀 Check Email</button>

</form>

<!-- Spinner -->
<div class="text-center mt-3 spinner" id="loader">
<div class="spinner-border text-light"></div>
<p>Analyzing email...</p>
</div>

<a href="/dashboard" class="btn btn-warning mt-3 w-100">📊 View Dashboard</a>

{% if result %}
<div class="mt-4 p-4 bg-secondary rounded">

<h4>Result: {{ result }}</h4>

<div class="progress mb-3">
<div class="progress-bar {% if score > 0.5 %}bg-danger{% else %}bg-success{% endif %}" 
style="width: {{score*100}}%">
{{ (score*100)|round(1) }}%
</div>
</div>

<ul>
{% for r in reasons %}
<li>{{ r }}</li>
{% endfor %}
</ul>

<h5 class="mt-3">🤖 AI Explanation:</h5>
<p>{{ explanation }}</p>

</div>
{% endif %}

</div>

</div>

<script>
function showLoader() {
    document.getElementById("loader").style.display = "block";
}
</script>

</body>
</html>
